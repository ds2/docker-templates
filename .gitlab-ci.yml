include:
  - project: "ds_2/ci-templates"
    ref: v3.1.2
    file:
      - "/templates/stages.yaml"
      - "/templates/global-vars.yaml"
      - "/templates/build-buildah.yaml"
      - "/templates/release-marker.yaml"

############################## Test Image Building ########################
build-packagecloud:
  extends: .build-with-buildah
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    CTX_DIR: package-cloud
    ADDITIONALTAGLIST: "staging"
    QUAY_IO_EXPIRY: "1w"

